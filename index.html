<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>QR Code Generator</h1>

      <label for="text">Text or URL</label>
      <textarea
        id="text"
        rows="3"
        placeholder="https://example.com"
        autofocus
      ></textarea>

      <div class="options">
        <label for="size">
          Size
          <input id="size" type="number" min="128" max="1024" step="32" value="320" />
        </label>
        <label for="ecl">
          Error correction
          <select id="ecl">
            <option value="L">Low</option>
            <option value="M" selected>Medium</option>
            <option value="Q">Quartile</option>
            <option value="H">High</option>
          </select>
        </label>
      </div>

      <div class="logo-row">
        <label for="logo">Logo</label>
        <div class="logo-input">
          <input
            id="logo"
            type="file"
            accept="image/png,image/jpeg,image/svg+xml,image/webp"
          />
          <button id="clear-logo" type="button" hidden>Clear</button>
        </div>
      </div>

      <div id="logo-options" class="logo-options" hidden>
        <label for="logo-size">
          Logo size <span id="logo-size-value">18%</span>
          <input id="logo-size" type="range" min="10" max="25" step="1" value="18" />
        </label>
      </div>

      <div class="output">
        <canvas id="canvas" aria-label="Generated QR code"></canvas>
        <p id="hint" class="hint">Enter text above to generate a QR code.</p>
      </div>

      <button id="download" type="button" disabled>Download PNG</button>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
